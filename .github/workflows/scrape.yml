name: Scheduled Scraper

on:
  schedule:
    # 07:00 UTC is 3 AM Eastern during daylight saving time and 2 AM Eastern
    # during standard time.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: vettrials-scraper
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape:
    name: Scrape all sources
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PUBLIC_SITE_URL: https://vettrials.org
      PLAYWRIGHT_BROWSERS_PATH: 0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Validate required secrets
        run: |
          test -n "$DATABASE_URL" || (echo "DATABASE_URL secret is not set" >&2; exit 1)
          test -n "$ANTHROPIC_API_KEY" || (echo "ANTHROPIC_API_KEY secret is not set" >&2; exit 1)

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Seed source metadata
        working-directory: backend
        run: npm run seed

      - name: Scrape all sources
        working-directory: backend
        run: npm run scrape:all
